<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>
<!-- Bootstrap 5 CDN Link -->
            <link
                href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
                rel="stylesheet">
            <style>

            body {
            background: linear-gradient(135deg, #252c37,#f8c61e );
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            }
            
            .login-card {
            background-color: #252c3736;
            backdrop-filter: blur(10px);
            border: 1px solid #494e4c;
            padding: 30px;
            border-radius: 10px;
            color: #f6e9d9;
            width: 100%;
            max-width: 400px;
            }
            </style>
            </head>
            <body>
            <div class="login-card">
            <h2 class="text-center mb-4">Login</h2>
            <form action="#" method="POST">


                <div class="form-floating mb-3">
                <input type="password" class="form-control form-control-lg is-invalid

                text-dark" id="passwordInput" placeholder="Password" value="12345">

                <label for="passwordInput" class="text-dark">Password</label>
                

                <div class="invalid-feedback text-warning fw-bold">
                Invalid password! Please try again.
                </div>
                </div>
                <button type="submit" class="btn btn-success w-100 btn-lg mt-2">Sign
                In</button>
                <href=><p class="text-center mt-3">Don't have an account? <a href="register.html" class=" text-warning fw-bold">Register here</a></p></h>
                </form>
                </div>
                            </body>
                            </html>
