<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>
<!-- Bootstrap 5 CDN Link -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
<style>
        
            body {
            background: linear-gradient(135deg, #252c37,#f8c61e  );
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            
        }
        
        .register-card {
        background-color: #252c3767;
        backdrop-filter: blur(10px);
        border: 1px solid #494e4c;
        padding: 30px;
        border-radius: 10px;
        color: #f6e9d9 ;
        width: 100%;
        max-width: 600px;
        }
            </style>
            </head>
            <body>
            <div class="register-card">
            <h2 class="text-center mb-4">Student Registration</h2>

            <form action="#" method="POST" onsubmit="event.preventDefault();">

            <div class="row mb-3">
            <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" placeholder="John smith  d monkey" required>
                    </div>
                <div class="col-md-6">
                <label class="form-label">Student LRN</label>
                <input type="text" class="form-control is-valid"

                        value="401234567890">

                    <div class="valid-feedback fw-bold text-info">
                    LRN verified successfully!
                    </div>
                    </div>
                    </div>

                        <div class="mb-3">
                        <label class="form-label">Username Handle</label>
                        <div class="input-group">
                        <span class="input-group-text">@</span>
                        <input type="text" class="form-control"

        placeholder="student.username" required>

                    <span class="input-group-text">@deped.gov.ph</span>
                    </div>
                    </div>
                    <div class="row mb-3">
                    <div class="col-md-6">
                    <label class="form-label">Academic Track / Strand</label>
                    <select class="form-select" required>
                    <option value="" selected disabled>Choose strand...</option>
                    <option value="ict">TVL - ICT (Programming)</option>
                    <option value="stem">Academic - STEM</option>
                  <option value="abm">Animation </option>
                    <option value="abm">Academic - ABM</option>
                    <option value="abm">humanities </option>
                    </select>
                    </div>
                <div class="col-md-6">
                <label class="form-label d-block">Gender Profile</label>
                <div class="form-check form-check-inline mt-2">
                <input class="form-check-input" type="radio" name="gender"

                id="male" checked>

                   <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check form-check-inline mt-2">
                <input class="form-check-input" type="radio" name="gender"

                id="female">

        <label class="form-check-label" for="female">Female</label>
        </div>
        </div>

        </div>

        <div class="row mb-3">
        <div class="col-md-6">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="Create

        password" required>
        </div>
        <div class="col-md-6">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" placeholder="Retype

        password" required>
        </div>
        </div>
        

        <div class="mb-4 form-check">
        <input class="form-check-input" type="checkbox" id="terms" checked

        required>

        <label class="form-check-label small text-white-50" for="terms">
        I agree to the digital Data Privacy Policy rules.
        </label>
        </div>
        <button type="submit" class="btn btn-success w-100 py-2">Submit
        Registration</button>
        </form>
        <p class="text-center mt-3">Already have an account? <a href="index.html " class="text-warning yelofw-bold">Login here</a></p></h>
        </div>
        </body>
        </html>
